name: Deploy backend to Oracle server

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docker/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Default is 10m — too short for a Docker build on this small VM,
          # especially while an old container from the previous compose file
          # (e.g. RabbitMQ, pegged near 150% CPU) is still running and
          # starving the build of CPU until this deploy finishes and replaces it.
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/dayclaim/backend
            git fetch origin main
            git reset --hard origin/main
            cd deploy
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build --remove-orphans
            docker image prune -f
