name: dayclaim

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: dayclaim_ar
      POSTGRES_USER: ${POSTGRES_USER:-dayclaim_ar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - dayclaim_postgres_data:/var/lib/postgresql/data
    # No host port published — only reachable from other containers on this
    # compose network. Nothing outside this box needs to talk to Postgres
    # directly.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dayclaim_ar} -d dayclaim_ar"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - dayclaim_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  ar-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Opt-in demo seeding — see Program.cs / docs/SECURITY.md. Flip to
      # "false" in .env once you no longer want the well-known Admin account.
      SeedDemoData: ${SEED_DEMO_DATA:-true}
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=dayclaim_ar;Username=${POSTGRES_USER:-dayclaim_ar};Password=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      Jwt__Issuer: dayclaim-ar-api
      Jwt__Audience: dayclaim-ar-clients
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?set JWT_SIGNING_KEY in .env (32+ chars)}
      Encryption__DataKey: ${ENCRYPTION_DATA_KEY:?set ENCRYPTION_DATA_KEY in .env (base64, 32 bytes)}
      Encryption__BlindIndexKey: ${ENCRYPTION_BLIND_INDEX_KEY:?set ENCRYPTION_BLIND_INDEX_KEY in .env (base64, 32 bytes)}
      # Frontend is served same-origin via the nginx proxy below, so this is
      # mostly a defense-in-depth backstop, not what makes login work.
      Cors__AllowedOrigins__0: ${PUBLIC_ORIGIN:?set PUBLIC_ORIGIN in .env, e.g. http://137.23.41.70}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      ar-api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Fixed host path the frontend repo's own deploy workflow rsyncs its
      # `dist/` build output into — not built by this compose file at all.
      - /opt/dayclaim/frontend/dist:/usr/share/nginx/html:ro

volumes:
  dayclaim_postgres_data:
  dayclaim_redis_data:
