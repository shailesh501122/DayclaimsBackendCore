server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same origin as the frontend on purpose — this is what makes CORS a
    # non-issue for a self-hosted single-box deployment, unlike the split
    # frontend/backend origins on Render.
    location /api/ {
        proxy_pass http://ar-api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Default 60s is too tight right after a (re)start on a small box —
        # EF Core's first query compilation can itself take a while under
        # memory pressure (see Program.cs's warm-up query, which should make
        # this a non-issue in practice, but this is the backstop for it).
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://ar-api:8080/health;
    }

    location /gateway/ {
        proxy_pass http://gateway:8000/gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — everything else is a client-side route.
    location / {
        try_files $uri /index.html;
    }

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # index.html must always revalidate so a new deploy is picked up
    # immediately; hashed assets can cache forever since their filename
    # changes whenever their content does.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
